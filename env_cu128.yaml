name: chorus
channels:
  - pytorch
  - nvidia
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - cuda-toolkit=12.8
  - conda-forge::cudnn
  - ninja
  - numba=0.61.2
  - google-sparsehash
  - h5py
  - pyyaml
  - tensorboard
  - tensorboardx
  - wandb
  - yapf
  - addict
  - einops=0.8.1
  - scipy=1.15.2
  - plyfile=1.1
  - termcolor
  - ftfy
  - regex
  - tqdm
  - matplotlib=3.10.3
  - scikit-learn
  - black
  - open3d=0.19.0
  - sharedarray=3.2.4
  - packaging
  - psutil
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu128
    - torch==2.7.1+cu128
    - torchvision==0.22.1+cu128
    - torchaudio==2.7.1+cu128
    - --find-links https://data.pyg.org/whl/torch-2.7.1+cu128.html
    - peft==0.17.1
    - gsplat==1.4.0
    - viser==1.0.27
    - nerfview==0.1.3
    - splines==0.3.3
    - sentencepiece==0.2.1
    - imageio-ffmpeg==0.6.0
    - opencv-python
    - scikit-image
    - open-clip-torch
    - miniball
    - shapely
    - umap-learn==0.5.9.post2
    - torch-cluster==1.6.3
    - torch-scatter==2.1.2
    - torch-sparse==0.6.18
    - torch-geometric==2.6.1
    - transformers==4.57.3
    - spconv-cu126
    - huggingface_hub==0.34.4
    - timm==1.0.26
    - ocnn @ git+https://github.com/octree-nn/ocnn-pytorch.git@0b55b274b4606d12580da7700e75aa67ad7d0a7b
    - clip @ git+https://github.com/openai/CLIP.git@ded190a052fdf4585bd685cee5bc96e0310d2c93

# Install separately to avoid complaints about torch not being found
# pip install flash-attn==2.8.3 --no-build-isolation
# pip install ./libs/pointops --no-build-isolation
# pip install ./libs/pointgroup_ops --no-build-isolation